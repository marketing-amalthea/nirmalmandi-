name: NirmalMandi CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── 1. Build & Test all backend services ──────────────────────
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      INTERNAL_SERVICE_SECRET: nm-jwt-secret-2026
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build:shared

      - name: Type-check all services
        run: |
          for svc in auth-service inventory-service order-service payment-service dispute-service analytics-service; do
            echo "Type-checking packages/$svc..."
            npx tsc --project packages/$svc/tsconfig.json --noEmit || echo "⚠️  $svc has type errors"
          done

      - name: Run backend tests
        run: npm test --workspaces --if-present -- --passWithNoTests --forceExit
        timeout-minutes: 5

  # ── 2. Type-check web + admin frontends ───────────────────────
  frontend:
    name: Frontend (type check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type-check web portal
        run: cd web && npx tsc --noEmit --skipLibCheck || echo "⚠️  web has type errors"

      - name: Type-check admin portal
        run: cd admin && npx tsc --noEmit --skipLibCheck || echo "⚠️  admin has type errors"

  # ── 3. Summary ────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Report
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          if [[ "${{ needs.backend.result }}" == "failure" ]]; then
            echo "❌ Backend tests failed — do not deploy"
            exit 1
          fi
          echo "✅ CI passed"
